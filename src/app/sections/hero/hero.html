<section class="hero">
    <div class="hero-container">
        <div class="hero-content">
            <p class="hero-public">{{public}}</p>

            <h1 class="hero-title">Your AI-Powered <span class="productivity">Productivity</span> Engine</h1>
            <p class="desc">{{description}}</p>
            <div class="btn-section">
                <button class="primaryBtn">{{primaryButtonText}} <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
                <button class="secondaryBtn"> {{secondaryButtonText}} <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-play-icon lucide-play"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg></button>
            </div>
        </div>

        <div class="hero_visual">
            <div class="orb_wrapper">
                <div class="orb_glow orb_glow--one"></div>
                <div class="orb_glow orb_glow--two"></div>

                <div class="orb_ring orb_ring--one"></div>
                <div class="orb_ring orb_ring--two"></div>

                <div class="orb_core">
                    <div class="orb_inner"></div>
                </div>

                <div class="floating_card floating_card--top">
                    <span class="floating_label">AI Sync</span>
                    <strong>Real-time flow</strong>
                </div>

                <div class="floating_card floating_card--bottom">
                    <span class="floating_label">Productivity</span>
                    <strong>+42%</strong>
                </div>
            </div>
        </div>
    </div>
</section>
